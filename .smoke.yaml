version: 1
project: cosmo-smoke
description: "Smoke tests for the smoke test runner"
settings:
  timeout: 30s
  fail_fast: true
tests:
  - name: "Compiles"
    run: "go build ./..."
    expect:
      exit_code: 0
    tags: [build]

  - name: "Tests pass"
    run: "go test -short ./..."
    expect:
      exit_code: 0
    tags: [test]

  - name: "Help flag"
    run: "go run . --help"
    expect:
      exit_code: 0
      stdout_contains: "smoke"
    tags: [runtime]

  - name: "Version command"
    run: "go run . version"
    expect:
      exit_code: 0
      stdout_contains: "smoke"
    tags: [runtime]

  - name: "Run command exists"
    run: "go run . run --help"
    expect:
      exit_code: 0
      stdout_contains: "smoke tests"
    tags: [runtime]

  - name: "Init command exists"
    run: "go run . init --help"
    expect:
      exit_code: 0
      stdout_contains: ".smoke.yaml"
    tags: [runtime]
