title: Watch mode continuous trace health monitoring
description: >
  When --watch and OTel are both enabled, tracks otel_trace assertion results
  across runs using a sliding window (last 10 results). Computes a health
  percentage and alerts when it drops below 50%. Health is displayed in the
  terminal summary and included in OTel-exported telemetry spans.
