title: Export smoke results as OTel telemetry
description: >
  Emits smoke test results as OTLP JSON spans to an OTel collector HTTP endpoint.
  Each test becomes a span with attributes (pass/fail, duration, assertion details).
  Uses manual OTLP JSON construction — no OTel SDK dependency. Wired via MultiReporter
  that fans out to both the terminal reporter and the OTel reporter.
status: completed
completed_in: v0.8.0
priority: 30
