    session: 2027
implementation:
    reporter: internal/reporter/otel.go (OTelReporter, OTLP JSON payload construction)
    reporter: internal/reporter/multi.go (MultiReporter fan-out)
    cli: cmd/run.go (withOTelExport helper, wired in both monorepo and normal paths)
    schema: internal/schema/schema.go (ExportURL, ExportHeaders fields on OTelConfig)
    tests: internal/reporter/otel_test.go (4 tests: span emission, summary, headers, unreachable)
