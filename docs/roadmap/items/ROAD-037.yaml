title: 'Trace-aware retry: only retry if trace never received'
description: |
    Adds retry_on_trace_only option to RetryPolicy. When enabled, retry is skipped if the otel_trace assertion confirms the trace was received at the collector. This prevents unnecessary retries when the system under test is responding (trace confirmed) but other assertions are failing for non-transient reasons.
